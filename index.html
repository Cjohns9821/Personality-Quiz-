<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Color Personality Quiz</title>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-light">

  <div class="container py-5">
    <h1 class="text-center mb-4">What Color Matches Your Personality?</h1>

    <!-- Question 1 -->
    <div class="question-block mb-4">
      <h4>How do you spend your free time?</h4>
      <button class="btn btn-outline-primary answer-btn" data-color="red">Trying something exciting</button>
      <button class="btn btn-outline-primary answer-btn" data-color="blue">Relaxing or reading</button>
      <button class="btn btn-outline-primary answer-btn" data-color="green">Being outdoors</button>
      <button class="btn btn-outline-primary answer-btn" data-color="yellow">Doing something creative</button>
    </div>

    <!-- Question 2 -->
    <div class="question-block mb-4">
      <h4>What describes your personality best?</h4>
      <button class="btn btn-outline-primary answer-btn" data-color="red">Bold</button>
      <button class="btn btn-outline-primary answer-btn" data-color="blue">Calm</button>
      <button class="btn btn-outline-primary answer-btn" data-color="green">Friendly</button>
      <button class="btn btn-outline-primary answer-btn" data-color="yellow">Playful</button>
    </div>

    <!-- Question 3 -->
    <div class="question-block mb-4">
      <h4>What’s your ideal weekend?</h4>
      <button class="btn btn-outline-primary answer-btn" data-color="red">Going on an adventure</button>
      <button class="btn btn-outline-primary answer-btn" data-color="blue">Quiet time at home</button>
      <button class="btn btn-outline-primary answer-btn" data-color="green">A walk in nature</button>
      <button class="btn btn-outline-primary answer-btn" data-color="yellow">Hanging out with friends</button>
    </div>

    <!-- Results Button -->
    <div class="text-center">
      <button id="result-btn" class="btn btn-success btn-lg mt-3">
        Give Me the Results
      </button>
    </div>

    <!-- Result Container -->
    <div id="result-container" class="mt-4 text-center fs-4 fw-bold"></div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Your Script -->
  <script src="script.js"></script>
</body>
</html>
